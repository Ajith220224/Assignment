<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Card </title>
    <style>
        body {
  font-family: Arial, sans-serif;
}

     .container {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

     .popup {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 300px;
  padding: 20px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);

  display: none;
  text-align: center;
}

     button {
  padding: 10px 15px;
  cursor: pointer;
}
    </style>
</head>
<body>
    <div class="container">
    <button onclick="showPopup()">Open Popup</button>

    <div class="popup" id="popup">
      <h2>Popup Card</h2>
      <p>This is a simple popup using absolute positioning.</p>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
